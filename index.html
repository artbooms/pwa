<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="robots" content="noindex,follow">
  <title>ARTBOOMS</title>

  <meta name="description" content="ARTBOOMS, magazine online d'arte contemporanea.">
  <link rel="canonical" href="https://www.artbooms.com/">

  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">

  <style>
    :root {
      --bg: #f3f3f3;
      --text: #193042;
      --white: #ffffff;
      --black: #000000;
      --muted: #6e7b88;
      --line: #e8e8e8;
      --soft-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
      --card-shadow: 0 10px 24px rgba(0, 0, 0, 0.10);
      --ios-blue: #0a84ff;
      --ios-tab: #8fa3b7;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
    }

    /* =========================
       APPLE MOBILE GUIDE
       ========================= */
    #appleGuide {
      display: none;
      min-height: 100vh;
      background: #ffffff;
      align-items: center;
      justify-content: center;
      padding: 22px 18px calc(22px + env(safe-area-inset-bottom, 0px));
    }

    .apple-guide-shell {
      width: 100%;
      max-width: 430px;
      min-height: calc(100vh - 44px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .apple-guide-card {
      width: 100%;
      max-width: 360px;
      background: #ffffff;
      border: 1px solid #eeeeee;
      border-radius: 22px;
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .apple-guide-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 18px 12px;
      font-size: 1.02rem;
      font-weight: 600;
      color: #1f2a36;
    }

    .apple-guide-close {
      font-size: 1.65rem;
      line-height: 1;
      color: #4f5c68;
      font-weight: 300;
    }

    .apple-app-row {
      margin: 0 18px 16px;
      border: 1px solid #f0f0f0;
      border-radius: 14px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fafafa;
    }

    .apple-app-icon {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      overflow: hidden;
      flex-shrink: 0;
      background: #ececec;
    }

    .apple-app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .apple-app-meta {
      text-align: left;
      min-width: 0;
    }

    .apple-app-name {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      color: #223646;
      line-height: 1.2;
    }

    .apple-app-domain {
      margin: 3px 0 0 0;
      font-size: 0.86rem;
      color: #7a8792;
      line-height: 1.2;
    }

    .apple-steps {
      list-style: none;
      margin: 0;
      padding: 0 18px 18px;
    }

    .apple-steps li {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 10px;
      align-items: start;
      margin-bottom: 16px;
      color: #2b3947;
      font-size: 0.98rem;
      line-height: 1.45;
    }

    .apple-steps li:last-child {
      margin-bottom: 0;
    }

    .step-num {
      font-weight: 700;
      color: #172b3a;
      text-align: right;
      padding-top: 1px;
    }

    .step-content {
      text-align: left;
    }

    .share-inline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      vertical-align: -3px;
      margin: 0 3px;
    }

    .share-inline svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .ios-chip {
      display: inline-block;
      margin-left: 4px;
      padding: 1px 8px;
      border-radius: 999px;
      background: #f1f3f5;
      border: 1px solid #e7eaee;
      font-size: 0.86rem;
      color: #33485a;
      white-space: nowrap;
    }

    .apple-bottom-bar {
      width: 100%;
      max-width: 360px;
      margin-top: 14px;
      background: #ffffff;
      border: 1px solid #f0f0f0;
      border-radius: 18px;
      box-shadow: var(--card-shadow);
      padding: 10px 14px;
      display: grid;
      grid-template-columns: 28px 28px 1fr 28px 28px 28px;
      align-items: center;
      gap: 10px;
      color: var(--ios-tab);
    }

    .apple-mini-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ios-tab);
      font-size: 1rem;
      line-height: 1;
    }

    .apple-domain-pill {
      min-width: 0;
      border: 1px solid #eceff2;
      border-radius: 999px;
      padding: 8px 12px;
      text-align: center;
      font-size: 0.88rem;
      color: #485b6a;
      background: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* =========================
       MAIN LAUNCHER
       ========================= */
    #mainLauncher {
      display: none;
      min-height: 100vh;
      width: 100%;
      background: var(--bg);
    }

    .launcher-shell {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5vh 24px 8vh;
    }

    .launcher-card {
      width: 100%;
      max-width: 640px;
      min-height: 86vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .top-space {
      flex: 0 0 16vh;
      min-height: 90px;
    }

    .icon-wrap {
      width: clamp(112px, 18vw, 132px);
      height: clamp(112px, 18vw, 132px);
      border-radius: 26px;
      background: #ececec;
      box-shadow: 0 6px 18px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 22px;
    }

    .icon-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .app-title {
      margin: 0 0 46px 0;
      font-size: clamp(2rem, 3.4vw, 2.2rem);
      line-height: 1;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: #193042;
      text-transform: uppercase;
    }

    .buttons {
      width: min(100%, 540px);
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .pill-button {
      width: 100%;
      min-height: clamp(76px, 10vw, 90px);
      border: none;
      border-radius: 999px;
      padding: 0 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      box-shadow: var(--soft-shadow);
      transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease;
      font: inherit;
    }

    .pill-button:active {
      transform: scale(0.988);
    }

    .pill-button.primary {
      background: #000000;
      color: #ffffff;
    }

    .pill-button.secondary {
      background: #ffffff;
      color: #111111;
    }

    .pill-left {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .pill-label {
      font-size: clamp(1rem, 2vw, 1.12rem);
      line-height: 1.2;
      font-weight: 600;
      white-space: nowrap;
    }

    .pill-arrow {
      font-size: clamp(2.2rem, 3vw, 2.6rem);
      line-height: 1;
      font-weight: 300;
      flex-shrink: 0;
      margin-left: 10px;
      transform: translateY(-1px);
    }

    .bell-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      display: block;
    }

    .bottom-space {
      flex: 1 0 22vh;
      min-height: 150px;
    }

    @media (max-width: 640px) {
      .launcher-shell {
        padding: 4vh 18px 8vh;
      }

      .top-space {
        flex-basis: 18vh;
      }

      .app-title {
        margin-bottom: 42px;
      }

      .buttons {
        width: min(100%, 570px);
        gap: 18px;
      }

      .pill-button {
        padding: 0 26px;
      }

      .pill-left {
        gap: 16px;
      }
    }

    @media (max-width: 430px) {
      .launcher-card {
        min-height: 90vh;
      }

      .top-space {
        flex-basis: 17vh;
        min-height: 78px;
      }

      .icon-wrap {
        width: 128px;
        height: 128px;
        border-radius: 24px;
        margin-bottom: 20px;
      }

      .app-title {
        font-size: 1.95rem;
        margin-bottom: 44px;
      }

      .pill-button {
        min-height: 76px;
        padding: 0 24px;
      }

      .pill-label {
        font-size: 1rem;
      }

      .pill-arrow {
        font-size: 2.3rem;
      }

      .bottom-space {
        min-height: 120px;
      }
    }
  </style>
</head>

<body>
  <section id="appleGuide">
    <div class="apple-guide-shell">
      <div class="apple-guide-card">
        <div class="apple-guide-header">
          <span>Installa l'app</span>
          <span class="apple-guide-close" aria-hidden="true">×</span>
        </div>

        <div class="apple-app-row">
          <div class="apple-app-icon">
            <img src="/icons/icon-192.png" alt="ARTBOOMS">
          </div>

          <div class="apple-app-meta">
            <p class="apple-app-name">ARTBOOMS</p>
            <p class="apple-app-domain">artbooms.com</p>
          </div>
        </div>

        <ol class="apple-steps">
          <li>
            <span class="step-num">1.</span>
            <div class="step-content">
              Premi
              <span class="share-inline" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="#0a84ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 3v10"></path>
                  <path d="M8.5 6.5 12 3l3.5 3.5"></path>
                  <rect x="4" y="11" width="16" height="10" rx="2.5" ry="2.5"></rect>
                </svg>
              </span>
              nel menu del browser
            </div>
          </li>

          <li>
            <span class="step-num">2.</span>
            <div class="step-content">
              Scorri in basso e tocca
              <span class="ios-chip">Aggiungi alla schermata Home</span>
            </div>
          </li>

          <li>
            <span class="step-num">3.</span>
            <div class="step-content">
              Cerca poi l’icona di ARTBOOMS sulla schermata Home
            </div>
          </li>
        </ol>
      </div>

      <div class="apple-bottom-bar" aria-hidden="true">
        <div class="apple-mini-icon">‹</div>
        <div class="apple-mini-icon">›</div>
        <div class="apple-domain-pill">artbooms.com</div>
        <div class="apple-mini-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#8fa3b7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <path d="M12 3v10"></path>
            <path d="M8.5 6.5 12 3l3.5 3.5"></path>
            <rect x="4" y="11" width="16" height="10" rx="2.5" ry="2.5"></rect>
          </svg>
        </div>
        <div class="apple-mini-icon">⌂</div>
        <div class="apple-mini-icon">⧉</div>
      </div>
    </div>
  </section>

  <main id="mainLauncher" aria-label="Launcher ARTBOOMS">
    <div class="launcher-shell">
      <div class="launcher-card">
        <div class="top-space"></div>

        <div class="icon-wrap" aria-hidden="true">
          <img src="/icons/icon-512.png" alt="">
        </div>

        <h1 class="app-title">ARTBOOMS</h1>

        <div class="buttons">
          <button id="launchButton" class="pill-button primary" type="button">
            <span class="pill-left">
              <span class="pill-label">avviare l'app</span>
            </span>
            <span class="pill-arrow" aria-hidden="true">›</span>
          </button>

          <button id="notifyButton" class="pill-button secondary" type="button" aria-live="polite">
            <span class="pill-left">
              <svg class="bell-icon" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M15 18H9"></path>
                <path d="M18 16v-5a6 6 0 1 0-12 0v5l-2 2h16l-2-2Z"></path>
                <path d="M10.5 20a1.5 1.5 0 0 0 3 0"></path>
              </svg>
              <span id="notifyLabel" class="pill-label">Attiva notifiche</span>
            </span>
          </button>
        </div>

        <div class="bottom-space"></div>
      </div>
    </div>
  </main>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(console.error);
    }

    let deferredPrompt = null;
    let autoInstallAttempted = false;

    function isStandaloneMode() {
      return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
    }

    function isAppleMobile() {
      const ua = navigator.userAgent || "";
      const platform = navigator.platform || "";
      const touch = navigator.maxTouchPoints || 0;
      return /iphone|ipad|ipod/i.test(ua) || (platform === "MacIntel" && touch > 1);
    }

    function goToMainSite() {
      window.location.href = "https://www.artbooms.com/";
    }

    function updateNotificationLabel() {
      const label = document.getElementById("notifyLabel");
      if (!label) return;

      if (!("Notification" in window)) {
        label.textContent = "Attiva notifiche";
        return;
      }

      label.textContent = Notification.permission === "granted"
        ? "Notifiche abilitate"
        : "Attiva notifiche";
    }

    async function requestNotificationPermission() {
      if (!("Notification" in window)) return "unsupported";
      if (Notification.permission === "granted") return "granted";

      try {
        return await Notification.requestPermission();
      } catch (err) {
        console.error(err);
        return "error";
      }
    }

    async function tryAutoInstall() {
      if (autoInstallAttempted || !deferredPrompt || isStandaloneMode()) return;
      autoInstallAttempted = true;

      try {
        await deferredPrompt.prompt();
        await deferredPrompt.userChoice;
      } catch (err) {
        console.error(err);
      }
    }

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;

      const params = new URLSearchParams(window.location.search);
      if (params.get("install") === "1" && !isAppleMobile()) {
        setTimeout(() => {
          tryAutoInstall();
        }, 250);
      }
    });

    window.addEventListener("appinstalled", () => {
      deferredPrompt = null;
      history.replaceState({}, "", "/");
    });

    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const installRequested = params.get("install") === "1";

      const installed = isStandaloneMode();
      const appleMobile = isAppleMobile();

      const appleGuide = document.getElementById("appleGuide");
      const mainLauncher = document.getElementById("mainLauncher");

      const launchButton = document.getElementById("launchButton");
      const notifyButton = document.getElementById("notifyButton");

      if (!installed && appleMobile) {
        appleGuide.style.display = "flex";
        mainLauncher.style.display = "none";
        return;
      }

      appleGuide.style.display = "none";
      mainLauncher.style.display = "block";

      updateNotificationLabel();

      if (installRequested && !installed && !appleMobile) {
        setTimeout(() => {
          tryAutoInstall();
        }, 400);
      }

      launchButton.addEventListener("click", () => {
        goToMainSite();
      });

      notifyButton.addEventListener("click", async () => {
        const result = await requestNotificationPermission();
        if (result === "granted") {
          updateNotificationLabel();
        }
      });
    });
  </script>
</body>
</html>
