<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="robots" content="noindex,follow">
  <title>ARTBOOMS — Offline</title>
  <meta name="description" content="Versione offline essenziale di ARTBOOMS.">
  <link rel="canonical" href="https://www.artbooms.com/">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">

  <style>
    :root {
      --bg: #ffffff;
      --text: #222222;
      --muted: #777777;
      --line: #eeeeee;
      --popup-bg: #ffffff;
      --popup-shadow: 0 10px 28px rgba(0,0,0,0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .ab-offline-popup-wrap {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      justify-content: center;
      align-items: flex-start;
      pointer-events: none;
      padding: 18px;
    }

    .ab-offline-popup-wrap.show {
      display: flex;
    }

    .ab-offline-popup {
      width: min(92vw, 520px);
      background: var(--popup-bg);
      color: #000;
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--popup-shadow);
      padding: 16px 18px;
      font-size: 1rem;
      line-height: 1.45;
      text-align: center;
    }

    .site-shell {
      width: 100%;
      max-width: 1050px;
      margin: 0 auto;
      padding: 0 28px 60px;
    }

    .site-header {
      padding: 62px 0 34px;
      text-align: center;
      border-bottom: 1px solid var(--line);
      margin-bottom: 44px;
    }

    .site-logo {
      display: block;
      width: min(460px, 82vw);
      height: auto;
      margin: 0 auto 24px;
      cursor: pointer;
    }

    .tagline {
      margin: 0;
      color: #777;
      font-family: "Arial Narrow", Arial, Helvetica, sans-serif;
      font-size: clamp(1.55rem, 3.4vw, 2.45rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .offline-list {
      display: flex;
      flex-direction: column;
      gap: 68px;
    }

    .home-article {
      border-bottom: 1px solid var(--line);
      padding-bottom: 54px;
    }

    .home-article:last-child {
      border-bottom: none;
    }

    .home-article-title {
      margin: 0 0 24px;
      color: #222;
      font-family: "Arial Narrow", "Helvetica Neue Condensed", Arial, Helvetica, sans-serif;
      font-size: clamp(3rem, 7.5vw, 5.9rem);
      font-stretch: condensed;
      font-weight: 700;
      line-height: 1.16;
      letter-spacing: -0.02em;
      cursor: pointer;
    }

    .home-article-date {
      margin: 0 0 34px;
      color: #777;
      font-size: clamp(1.4rem, 3.2vw, 2.35rem);
      line-height: 1.2;
    }

    .home-article-image {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 0 26px;
      cursor: pointer;
    }

    .home-article-excerpt {
      margin: 0;
      color: #333;
      font-size: 1.05rem;
      line-height: 1.65;
      max-width: 820px;
    }

    .article-view {
      display: none;
      padding-bottom: 80px;
    }

    .article-view.active {
      display: block;
    }

    .article-title {
      margin: 0 0 24px;
      color: #222;
      font-family: "Arial Narrow", "Helvetica Neue Condensed", Arial, Helvetica, sans-serif;
      font-size: clamp(3rem, 7.5vw, 5.9rem);
      font-weight: 700;
      line-height: 1.16;
      letter-spacing: -0.02em;
    }

    .article-date {
      margin: 0 0 34px;
      color: #777;
      font-size: clamp(1.4rem, 3.2vw, 2.35rem);
    }

    .article-main-image,
    .article-content img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 0 28px;
    }

    .article-content {
      color: #222;
      font-size: 1.08rem;
      line-height: 1.75;
      max-width: 860px;
    }

    .article-content p,
    .article-content blockquote,
    .article-content ul,
    .article-content ol,
    .article-content figure {
      margin: 0 0 22px;
    }

    .article-content h2,
    .article-content h3,
    .article-content h4 {
      margin: 0 0 22px;
      font: inherit;
      font-weight: inherit;
      line-height: inherit;
      letter-spacing: inherit;
    }

    .article-content figcaption {
      margin-top: -16px;
      margin-bottom: 24px;
      color: #777;
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .article-content blockquote {
      border-left: 3px solid #ddd;
      padding-left: 18px;
      color: #444;
    }

    .back-button {
      display: inline-block;
      border: 1px solid #ddd;
      background: #fff;
      color: #222;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      margin: 26px 0 0;
    }

    .empty {
      border: 1px solid var(--line);
      padding: 22px;
      color: #777;
      text-align: center;
    }

    @media (max-width: 700px) {
      .site-shell {
        padding: 0 40px 46px;
      }

      .site-header {
        padding: 70px 0 30px;
        margin-bottom: 42px;
      }

      .site-logo {
        width: min(340px, 76vw);
        margin-bottom: 22px;
      }

      .offline-list {
        gap: 58px;
      }

      .home-article {
        padding-bottom: 48px;
      }

      .home-article-title,
      .article-title {
        font-size: clamp(3.15rem, 11vw, 4.75rem);
        line-height: 1.16;
      }

      .home-article-date,
      .article-date {
        font-size: clamp(1.55rem, 6vw, 2.15rem);
        margin-bottom: 34px;
      }

      .home-article-excerpt,
      .article-content {
        font-size: 1.02rem;
      }
    }

    @media (min-width: 900px) {
      .site-shell {
        max-width: 980px;
      }

      .home-article-title,
      .article-title {
        font-size: 4.8rem;
      }
    }
  </style>
</head>
<body>
  <div id="offlinePopupWrap" class="ab-offline-popup-wrap">
    <div class="ab-offline-popup">
      <strong>Sei Offline</strong><br>
      A presto<br>
      per una navigazione<br>
      più approfondita
    </div>
  </div>

  <main class="site-shell">
    <header class="site-header">
      <img id="siteLogo" class="site-logo" src="/images/artbooms-logo.webp" alt="ARTBOOMS">
      <p class="tagline">MAGAZINE D'ARTE CONTEMPORANEA</p>
    </header>

    <section id="homeView">
      <div id="articleList" class="offline-list"></div>
    </section>

    <section id="articleView" class="article-view"></section>
  </main>

  <script>
    const MEMORY_JSON_URL = "https://artbooms.github.io/artbooms-pwa-memory/memory-data.json";
    const STORAGE_KEY = "artbooms-offline-memory-v5";

    function showOfflinePopup() {
      const wrap = document.getElementById("offlinePopupWrap");
      wrap.classList.add("show");
      setTimeout(() => wrap.classList.remove("show"), 3200);
    }

    function normalizeImage(url) {
      return (url || "").replace(/^http:\/\//i, "https://");
    }

    function contentStartsWithLeadImage(article) {
      if (!article || !article.image || !article.content_html) return false;

      const wrapper = document.createElement("div");
      wrapper.innerHTML = article.content_html;

      const firstImage = wrapper.querySelector("img");
      if (!firstImage) return false;

      const clean = (url) => normalizeImage(url || "").split("?")[0];

      return clean(firstImage.getAttribute("src")) === clean(article.image);
    }

    function collectImageUrls(data) {
      const urls = [];
      const articles = Array.isArray(data?.articles) ? data.articles : [];

      articles.forEach((article) => {
        if (article.image) urls.push(normalizeImage(article.image));
        if (Array.isArray(article.images)) {
          article.images.forEach((u) => urls.push(normalizeImage(u)));
        }

        const html = article.content_html || "";
        const matches = html.matchAll(/<img[^>]+src=["']([^"']+)["']/gi);
        for (const match of matches) urls.push(normalizeImage(match[1]));
      });

      return [...new Set(urls.filter(Boolean))];
    }

    function askServiceWorkerToCacheImages(data) {
      if (!navigator.serviceWorker || !navigator.serviceWorker.controller) return;
      navigator.serviceWorker.controller.postMessage({
        type: "CACHE_IMAGES",
        urls: collectImageUrls(data)
      });
    }

    function loadStoredMemory() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (err) {
        return null;
      }
    }

    function saveMemory(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (err) {}
    }

    function normalizeData(data) {
      const articles = Array.isArray(data?.articles) ? data.articles : [];
      return {
        ...data,
        articles: articles.map((article) => ({
          ...article,
          image: normalizeImage(article.image || ""),
          images: Array.isArray(article.images) ? article.images.map(normalizeImage) : []
        }))
      };
    }

    function showHome() {
      document.getElementById("homeView").style.display = "block";
      document.getElementById("articleView").classList.remove("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function openArticle(article, index) {
      const home = document.getElementById("homeView");
      const view = document.getElementById("articleView");

      home.style.display = "none";
      view.innerHTML = `
        <article>
          <h1 class="article-title">${article.title || ""}</h1>
          <p class="article-date">${article.display_date || ""}</p>
          ${article.image && !contentStartsWithLeadImage(article) ? `<img class="article-main-image" src="${article.image}" alt="">` : ""}
          <div class="article-content">${article.content_html || ""}</div>
          <button class="back-button" type="button" id="backButton">Torna alla home</button>
        </article>
      `;
      view.classList.add("active");
      document.getElementById("backButton").addEventListener("click", showHome);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderHome(data) {
      const list = document.getElementById("articleList");
      const normalized = normalizeData(data);
      const articles = normalized.articles;

      if (!articles.length) {
        list.innerHTML = '<div class="empty">La memoria offline non è ancora disponibile. Apri la PWA online almeno una volta.</div>';
        return;
      }

      list.innerHTML = articles.map((article, index) => `
        <article class="home-article" data-index="${index}">
          <h1 class="home-article-title">${article.title || ""}</h1>
          <p class="home-article-date">${article.display_date || ""}</p>
          ${article.image ? `<img class="home-article-image" src="${article.image}" alt="">` : ""}
          ${article.excerpt ? `<p class="home-article-excerpt">${article.excerpt}</p>` : ""}
        </article>
      `).join("");

      document.querySelectorAll(".home-article").forEach((node) => {
        node.addEventListener("click", () => {
          const index = Number(node.getAttribute("data-index"));
          openArticle(articles[index], index);
        });
      });
    }

    async function initMemory() {
      const stored = loadStoredMemory();

      if (!navigator.onLine) {
        showOfflinePopup();
        renderHome(stored || { articles: [] });
        return;
      }

      try {
        const response = await fetch(MEMORY_JSON_URL, { cache: "no-store" });
        const fresh = normalizeData(await response.json());
        saveMemory(fresh);
        renderHome(fresh);
        askServiceWorkerToCacheImages(fresh);
      } catch (err) {
        renderHome(stored || { articles: [] });
      }
    }

    window.addEventListener("online", () => {
      window.location.href = "/";
    });

    document.getElementById("siteLogo").addEventListener("click", showHome);

    window.addEventListener("offline", showOfflinePopup);

    initMemory();
  </script>
</body>
</html>
