<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="robots" content="noindex,follow">
  <title>ARTBOOMS — Offline</title>
  <meta name="description" content="Versione offline essenziale di ARTBOOMS.">
  <link rel="canonical" href="https://www.artbooms.com/">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">

  <style>
    :root {
      --bg: #f3f3f3;
      --text: #193042;
      --muted: #6e7b88;
      --line: #e8e8e8;
      --card: #ffffff;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      --black: #000000;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .top {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      text-align: center;
      padding: 18px 18px 10px;
    }

    .brand img {
      width: min(78%, 290px);
      height: auto;
      display: inline-block;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      padding: 0 18px 14px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .menu span {
      opacity: 0.9;
      pointer-events: none;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 18px;
    }

    .notice {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 14px 16px;
      line-height: 1.45;
      margin-bottom: 18px;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .header-row h1 {
      margin: 0;
      font-size: 1.18rem;
      line-height: 1.2;
    }

    .site-btn {
      border: none;
      border-radius: 999px;
      background: var(--black);
      color: var(--white);
      padding: 11px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      aspect-ratio: 16 / 9;
      background: #e9ecef;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .body {
      padding: 16px 18px;
    }

    .date {
      margin: 0 0 8px;
      font-size: 0.86rem;
      color: var(--muted);
    }

    .title {
      margin: 0 0 10px;
      font-size: 1.18rem;
      line-height: 1.25;
    }

    .excerpt {
      margin: 0;
      color: #304659;
      line-height: 1.5;
    }

    .article {
      display: none;
      margin-top: 18px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .article.active {
      display: block;
    }

    .article .meta {
      margin: 0 0 10px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .article h2 {
      margin: 0 0 12px;
      font-size: 1.42rem;
      line-height: 1.25;
    }

    .article img {
      max-width: 100%;
      height: auto;
      display: block;
      border-radius: 14px;
      margin: 0 0 14px;
    }

    .article .content p,
    .article .content h3,
    .article .content h4,
    .article .content blockquote,
    .article .content ul,
    .article .content ol {
      margin: 0 0 14px;
      line-height: 1.6;
    }

    .article .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .ghost {
      border: 1px solid #d9dde2;
      background: #ffffff;
      color: var(--text);
      border-radius: 999px;
      padding: 11px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .empty {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .header-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .title {
        font-size: 1.08rem;
      }

      .article h2 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="top">
    <div class="brand">
      <img src="/images/artbooms-logo.webp" alt="ARTBOOMS">
    </div>
    <div class="menu">
      <span>home</span>
      <span>arte</span>
      <span>design</span>
      <span>fotografia</span>
      <span>chi siamo</span>
    </div>
  </div>

  <div class="wrap">
    <div class="notice">
      <b>Sei offline.</b> Qui trovi una memoria essenziale della home di ARTBOOMS con gli ultimi tre articoli disponibili.
    </div>

    <div class="header-row">
      <h1>Ultimi articoli disponibili offline</h1>
      <button id="openSiteBtn" class="site-btn" type="button">Apri il sito appena torni online</button>
    </div>

    <div id="list" class="list"></div>
    <div id="articleHost"></div>
  </div>

  <script>
    async function loadMemory() {
      const list = document.getElementById("list");
      const articleHost = document.getElementById("articleHost");

      try {
        const res = await fetch("/memory-data.json", { cache: "no-store" });
        const data = await res.json();
        const articles = Array.isArray(data.articles) ? data.articles : [];

        if (!articles.length) {
          list.innerHTML = '<div class="empty">La memoria offline non è ancora pronta.</div>';
          return;
        }

        list.innerHTML = articles.map((article, idx) => `
          <a href="#article-${idx}" class="card" data-article-index="${idx}">
            <div class="hero">${article.image ? `<img src="${article.image}" alt="">` : ""}</div>
            <div class="body">
              <p class="date">${article.display_date || ""}</p>
              <h2 class="title">${article.title || ""}</h2>
              <p class="excerpt">${article.excerpt || ""}</p>
            </div>
          </a>
        `).join("");

        articleHost.innerHTML = articles.map((article, idx) => `
          <article id="article-${idx}" class="article">
            <p class="meta">${article.display_date || ""}</p>
            <h2>${article.title || ""}</h2>
            ${article.image ? `<img src="${article.image}" alt="">` : ""}
            <div class="content">${article.content_html || ""}</div>
            <div class="actions">
              <button class="ghost" type="button" data-back="1">Torna all'elenco</button>
            </div>
          </article>
        `).join("");

        document.querySelectorAll("[data-article-index]").forEach((card) => {
          card.addEventListener("click", (e) => {
            e.preventDefault();
            const idx = card.getAttribute("data-article-index");
            document.querySelectorAll(".article").forEach(el => el.classList.remove("active"));
            const target = document.getElementById(`article-${idx}`);
            if (target) {
              target.classList.add("active");
              target.scrollIntoView({ behavior: "smooth", block: "start" });
            }
          });
        });

        document.querySelectorAll("[data-back]").forEach((btn) => {
          btn.addEventListener("click", () => {
            document.querySelectorAll(".article").forEach(el => el.classList.remove("active"));
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
        });

      } catch (err) {
        list.innerHTML = '<div class="empty">Memoria offline non disponibile.</div>';
      }
    }

    document.getElementById("openSiteBtn").addEventListener("click", () => {
      if (navigator.onLine) {
        window.location.href = "https://www.artbooms.com/";
      } else {
        alert("Sei ancora offline.");
      }
    });

    loadMemory();
  </script>
</body>
</html>
